# CI Pipeline — PUBG Aim Analyzer
# Runs on push to main and on PRs.
# Quality checks run always; Build uses placeholder env vars.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npx vitest run

      - name: Benchmark regression + coverage gate
        run: npm run benchmark:gate

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost/ci"
          AUTH_SECRET: "ci-placeholder-secret-not-real"
          AUTH_GOOGLE_ID: "ci-google-id"
          AUTH_GOOGLE_SECRET: "ci-google-secret"
          AUTH_DISCORD_ID: "ci-discord-id"
          AUTH_DISCORD_SECRET: "ci-discord-secret"
          AUTH_URL: "http://localhost:3000"
          AUTH_TRUST_HOST: "true"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost/ci"
      AUTH_SECRET: "ci-placeholder-secret-not-real"
      AUTH_GOOGLE_ID: "ci-google-id"
      AUTH_GOOGLE_SECRET: "ci-google-secret"
      AUTH_DISCORD_ID: "ci-discord-id"
      AUTH_DISCORD_SECRET: "ci-discord-secret"
      AUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run smoke:local
